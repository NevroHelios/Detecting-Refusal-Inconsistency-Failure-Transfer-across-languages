model_id: google/gemma-3-12b-it   # gated on HF: accept the license + use a token
model_revision: main               # pin to a commit hash before publication runs
quant: nf4                         # house standard (matches Llama-8B/Qwen). On an
                                   # H100 you can switch to `none` for bf16 full
                                   # precision (~24GB) if you prefer no quant noise.
target_lang: Hindi
splits: [harmful, benign]
template_id: v1
tag: nosysp                        # no-system-prompt run (Gemma's template has no system role)
# thinking_policy: dense           # Gemma 3 is not a reasoning model; dense is the default
# limit: 20                        # cap rows for a quick pilot first

# No system_prompts block -> no system prompt on either scoring side.
# Gemma chat templates do not support a `system` role, so a sysp variant is omitted.
